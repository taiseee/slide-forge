</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" data-paginate="true" data-class="lead" data-theme="research" lang="en-US" class="lead" data-marpit-pagination="6" style="--paginate:true;--class:lead;--theme:research;" data-marpit-pagination-total="44" data-size="16:9">
<h1 id="%E7%94%9F%E6%88%90%E7%94%BB%E5%83%8F%E3%81%AE%E8%89%AF%E3%81%95%E3%82%92%E4%BA%BA%E6%89%8B%E3%81%AB%E9%A0%BC%E3%82%89%E3%81%9A%E6%B8%AC%E3%82%8C%E3%82%8B%E3%81%8B">生成画像の「良さ」を、人手に頼らず測れるか。</h1>
<p>本研究が取り組む問い</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" data-paginate="true" data-class="content" data-theme="research" lang="en-US" class="content" data-marpit-pagination="7" style="--paginate:true;--class:content;--theme:research;" data-marpit-pagination-total="44" data-size="16:9">
<h1 id="%E7%A0%94%E7%A9%B6%E8%83%8C%E6%99%AF">研究背景</h1>
<ul>
<li>画像生成モデルの評価には人手評価が広く使われている
<ul>
<li>評価コストが高く、再現性に課題がある</li>
</ul>
</li>
<li>CLIPスコアによる自動評価が注目されている
<ul>
<li>テキストと画像の整合性を埋め込み空間で測定</li>
</ul>
</li>
<li><strong>課題</strong>: 既存手法は細部の品質劣化を捉えられない</li>
</ul>
<blockquote>
<p>本研究では、局所特徴を考慮した自動評価指標を提案する</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" data-paginate="true" data-class="two-column" data-theme="research" lang="en-US" class="two-column" data-marpit-pagination="8" style="--paginate:true;--class:two-column;--theme:research;" data-marpit-pagination-total="44" data-size="16:9">
<h1 id="%E9%96%A2%E9%80%A3%E7%A0%94%E7%A9%B6%E3%81%AE%E6%95%B4%E7%90%86">関連研究の整理</h1>
<h2 id="%E8%87%AA%E5%8B%95%E8%A9%95%E4%BE%A1%E6%8C%87%E6%A8%99">自動評価指標</h2>
<ul>
<li>CLIPスコア: テキスト整合性</li>
<li>FID: 分布間距離</li>
<li>LPIPS: 知覚的類似度</li>
</ul>
<h2 id="%E4%BA%BA%E6%89%8B%E8%A9%95%E4%BE%A1">人手評価</h2>
<ul>
<li>MOS: 平均オピニオン評価</li>
<li>ペア比較: 相対品質評価</li>
</ul>
<h2 id="%E6%97%A2%E5%AD%98%E6%89%8B%E6%B3%95%E3%81%AE%E9%99%90%E7%95%8C">既存手法の限界</h2>
<ul>
<li>大域特徴のみで局所劣化を無視</li>
<li>評価対象ドメインへの依存</li>
<li>人手評価との相関が不十分</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" data-paginate="true" data-class="hypothesis" data-theme="research" lang="en-US" class="hypothesis" data-marpit-pagination="9" style="--paginate:true;--class:hypothesis;--theme:research;" data-marpit-pagination-total="44" data-size="16:9">
<h1 id="%E6%9C%AC%E7%A0%94%E7%A9%B6%E3%81%AE%E4%BB%AE%E8%AA%AC">本研究の仮説</h1>
<ol>
<li><strong>局所性</strong> 生成画像の品質劣化は局所領域に集中して現れる</li>
<li><strong>相関</strong> パッチ単位のCLIP類似度は人手評価と相関する</li>
<li><strong>転移</strong> 局所スコアはドメインを跨いでも有効に機能する</li>
</ol>
<p>各仮説は 4章の実験1〜3 でそれぞれ検証する</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" data-paginate="true" data-class="sidebar" data-theme="research" lang="en-US" class="sidebar" data-marpit-pagination="10" style="--paginate:true;--class:sidebar;--theme:research;" data-marpit-pagination-total="44" data-size="16:9">
<h1 id="%E5%AE%9F%E9%A8%93%E3%81%AE%E5%89%8D%E6%8F%90%E6%9D%A1%E4%BB%B6">実験の前提条件</h1>
<ul>
<li>生成モデルは公開チェックポイントを使用し、追加学習は行わない</li>
<li>プロンプトは MS-COCO キャプションから 1,000 件を抽出</li>
<li>評価者は 20 名、各画像を 5 段階で採点</li>
</ul>
<p>すべての実験は同一シードで 3 回実行し、平均値を報告する</p>
<blockquote>
<p><strong>補足</strong><br />
評価者間の一致度は Krippendorff の α = 0.72。<br />
採点画面の提示順はランダム化し、順序効果を除いた。</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="11" data-paginate="true" data-class="image-right" data-theme="research" lang="en-US" class="image-right" data-marpit-pagination="11" style="--paginate:true;--class:image-right;--theme:research;" data-marpit-pagination-total="44" data-size="16:9">

<li>エンコーダで局所特徴を抽出</li>
<li>デコーダ側でテキスト条件を融合</li>
<li>局所・大域スコアを統合して出力</li>
</ul>
<p><strong>ポイント</strong>: 既存のCLIP埋め込みを再利用し、追加学習を最小化</p>
<p><img src="assets/placeholder-figure.svg" alt="" /></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="12" data-paginate="true" data-class="image-left" data-theme="research" lang="en-US" class="image-left" data-marpit-pagination="12" style="--paginate:true;--class:image-left;--theme:research;" data-marpit-pagination-total="44" data-size="16:9">

<p>局所スコアと大域スコアを重み付き和で統合する:</p>
<p><span is="marp-span" data-auto-scaling="downscale-only" class="katex-display"><span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML" display="block"><semantics><mrow><mi>S</mi><mo stretchy="false">(</mo><mi>x</mi><mo separator="true">,</mo><mi>t</mi><mo stretchy="false">)</mo><mo>=</mo><mi>λ</mi><mo>⋅</mo><mfrac><mn>1</mn><mi>N</mi></mfrac><munderover><mo>∑</mo><mrow><mi>i</mi><mo>=</mo><mn>1</mn></mrow><mi>N</mi></munderover><msub><mi>w</mi><mi>i</mi></msub><mtext> </mtext><mrow><mi mathvariant="normal">s</mi><mi mathvariant="normal">i</mi><mi mathvariant="normal">m</mi></mrow><mo stretchy="false">(</mo><msub><mi>f</mi><mi>i</mi></msub><mo stretchy="false">(</mo><mi>x</mi><mo stretchy="false">)</mo><mo separator="true">,</mo><mi>g</mi><mo stretchy="false">(</mo><mi>t</mi><mo stretchy="false">)</mo><mo stretchy="false">)</mo><mo>+</mo><mo stretchy="false">(</mo><mn>1</mn><mo>−</mo><mi>λ</mi><mo stretchy="false">)</mo><mo>⋅</mo><mrow><mi mathvariant="normal">s</mi><mi mathvariant="normal">i</mi><mi mathvariant="normal">m</mi></mrow><mo stretchy="false">(</mo><mi>f</mi><mo stretchy="false">(</mo><mi>x</mi><mo stretchy="false">)</mo><mo separator="true">,</mo><mi>g</mi><mo stretchy="false">(</mo><mi>t</mi><mo stretchy="false">)</mo><mo stretchy="false">)</mo></mrow><annotation encoding="application/x-tex">S(x, t) = \lambda \cdot \frac{1}{N} \sum_{i=1}^{N} w_i \, \mathrm{sim}(f_i(x), g(t)) + (1 - \lambda) \cdot \mathrm{sim}(f(x), g(t))
</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:1em;vertical-align:-0.25em;"></span><span class="mord mathnormal" style="margin-right:0.0576em;">S</span><span class="mopen">(</span><span class="mord mathnormal">x</span><span class="mpunct">,</span><span class="mspace" style="margin-right:0.1667em;"></span><span class="mord mathnormal">t</span><span class="mclose">)</span><span class="mspace" style="margin-right:0.2778em;"></span><span class="mrel">=</span><span class="mspace" style="margin-right:0.2778em;"></span></span><span class="base"><span class="strut" style="height:0.6944em;"></span><span class="mord mathnormal">λ</span><span class="mspace" style="margin-right:0.2222em;"></span><span class="mbin">⋅</span><span class="mspace" style="margin-right:0.2222em;"></span></span><span class="base"><span class="strut" style="height:3.106em;vertical-align:-1.2777em;"></span><span class="mord"><span class="mopen nulldelimiter"></span><span class="mfrac"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:1.3214em;"><span style="top:-2.314em;"><span class="pstrut" style="height:3em;"></span><span class="mord"><span class="mord mathnormal" style="margin-right:0.109em;">N</span></span></span><span style="top:-3.23em;"><span class="pstrut" style="height:3em;"></span><span class="frac-line" style="border-bottom-width:0.04em;"></span></span><span style="top:-3.677em;"><span class="pstrut" style="height:3em;"></span><span class="mord"><span class="mord">1</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.686em;"><span></span></span></span></span></span><span class="mclose nulldelimiter"></span></span><span class="mspace" style="margin-right:0.1667em;"></span><span class="mop op-limits"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:1.8283em;"><span style="top:-1.8723em;margin-left:0em;"><span class="pstrut" style="height:3.05em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mtight"><span class="mord mathnormal mtight">i</span><span class="mrel mtight">=</span><span class="mord mtight">1</span></span></span></span><span style="top:-3.05em;"><span class="pstrut" style="height:3.05em;"></span><span><span class="mop op-symbol large-op">∑</span></span></span><span style="top:-4.3em;margin-left:0em;"><span class="pstrut" style="height:3.05em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mtight"><span class="mord mathnormal mtight" style="margin-right:0.109em;">N</span></span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:1.2777em;"><span></span></span></span></span></span><span class="mspace" style="margin-right:0.1667em;"></span><span class="mord"><span class="mord mathnormal" style="margin-right:0.0269em;">w</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.3117em;"><span style="top:-2.55em;margin-left:-0.0269em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mathnormal mtight">i</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.15em;"><span></span></span></span></span></span></span><span class="mspace" style="margin-right:0.1667em;"></span><span class="mord"><span class="mord mathrm">sim</span></span><span class="mopen">(</span><span class="mord"><span class="mord mathnormal" style="margin-right:0.1076em;">f</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.3117em;"><span style="top:-2.55em;margin-left:-0.1076em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mathnormal mtight">i</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.15em;"><span></span></span></span></span></span></span><span class="mopen">(</span><span class="mord mathnormal">x</span><span class="mclose">)</span><span class="mpunct">,</span><span class="mspace" style="margin-right:0.1667em;"></span><span class="mord mathnormal" style="margin-right:0.0359em;">g</span><span class="mopen">(</span><span class="mord mathnormal">t</span><span class="mclose">))</span><span class="mspace" style="margin-right:0.2222em;"></span><span class="mbin">+</span><span class="mspace" style="margin-right:0.2222em;"></span></span><span class="base"><span class="strut" style="height:1em;vertical-align:-0.25em;"></span><span class="mopen">(</span><span class="mord">1</span><span class="mspace" style="margin-right:0.2222em;"></span><span class="mbin">−</span><span class="mspace" style="margin-right:0.2222em;"></span></span><span class="base"><span class="strut" style="height:1em;vertical-align:-0.25em;"></span><span class="mord mathnormal">λ</span><span class="mclose">)</span><span class="mspace" style="margin-right:0.2222em;"></span><span class="mbin">⋅</span><span class="mspace" style="margin-right:0.2222em;"></span></span><span class="base"><span class="strut" style="height:1em;vertical-align:-0.25em;"></span><span class="mord"><span class="mord mathrm">sim</span></span><span class="mopen">(</span><span class="mord mathnormal" style="margin-right:0.1076em;">f</span><span class="mopen">(</span><span class="mord mathnormal">x</span><span class="mclose">)</span><span class="mpunct">,</span><span class="mspace" style="margin-right:0.1667em;"></span><span class="mord mathnormal" style="margin-right:0.0359em;">g</span><span class="mopen">(</span><span class="mord mathnormal">t</span><span class="mclose">))</span></span></span></span></span></p><ul>
<li><span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><msub><mi>f</mi><mi>i</mi></msub><mo stretchy="false">(</mo><mi>x</mi><mo stretchy="false">)</mo></mrow><annotation encoding="application/x-tex">f_i(x)</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:1em;vertical-align:-0.25em;"></span><span class="mord"><span class="mord mathnormal" style="margin-right:0.1076em;">f</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.3117em;"><span style="top:-2.55em;margin-left:-0.1076em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mathnormal mtight">i</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.15em;"><span></span></span></span></span></span></span><span class="mopen">(</span><span class="mord mathnormal">x</span><span class="mclose">)</span></span></span></span>: パッチ <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><mi>i</mi></mrow><annotation encoding="application/x-tex">i</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.6595em;"></span><span class="mord mathnormal">i</span></span></span></span> の局所特徴、<span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><mi>g</mi><mo stretchy="false">(</mo><mi>t</mi><mo stretchy="false">)</mo></mrow><annotation encoding="application/x-tex">g(t)</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:1em;vertical-align:-0.25em;"></span><span class="mord mathnormal" style="margin-right:0.0359em;">g</span><span class="mopen">(</span><span class="mord mathnormal">t</span><span class="mclose">)</span></span></span></span>: テキスト埋め込み</li>
<li><span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><msub><mi>w</mi><mi>i</mi></msub></mrow><annotation encoding="application/x-tex">w_i</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.5806em;vertical-align:-0.15em;"></span><span class="mord"><span class="mord mathnormal" style="margin-right:0.0269em;">w</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.3117em;"><span style="top:-2.55em;margin-left:-0.0269em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mathnormal mtight">i</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.15em;"><span></span></span></span></span></span></span></span></span></span>: 劣化候補パッチへの重み、<span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><mi>λ</mi></mrow><annotation encoding="application/x-tex">\lambda</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.6944em;"></span><span class="mord mathnormal">λ</span></span></span></span>: 統合係数</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="26" data-paginate="true" data-class="code" data-theme="research" lang="en-US" class="code" data-marpit-pagination="26" style="--paginate:true;--class:code;--theme:research;" data-marpit-pagination-total="44" data-size="16:9">
<h1 id="%E3%82%B9%E3%82%B3%E3%82%A2%E8%A8%88%E7%AE%97%E3%81%AE%E5%AE%9F%E8%A3%85">スコア計算の実装</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">def</span> <span class="hljs-title function_">slide_forge_score</span>(<span class="hljs-params">image, text, patches, lam=<span class="hljs-number">0.6</span></span>):
    local = <span class="hljs-built_in">sum</span>(w * sim(f(p), g(text)) <span class="hljs-keyword">for</span> p, w <span class="hljs-keyword">in</span> patches) / <span class="hljs-built_in">len</span>(patches)
    global_ = sim(f(image), g(text))
    <span class="hljs-keyword">return</span> lam * local + (<span class="hljs-number">1</span> - lam) * global_
</code></pre>
<p>CLIP埋め込み f, g は既存モデルを再利用し、追加学習は統合係数のみ</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="27" data-paginate="true" data-class="quote" data-theme="research" lang="en-US" class="quote" data-marpit-pagination="27" style="--paginate:true;--class:quote;--theme:research;" data-marpit-pagination-total="44" data-size="16:9">
<h1 id="%E5%85%88%E8%A1%8C%E7%A0%94%E7%A9%B6%E3%81%AE%E6%8C%87%E6%91%98">先行研究の指摘</h1>
<blockquote>
<p>既存の自動評価指標は大域的な整合性に偏っており、局所的な品質劣化を捉えられていない。</p>
</blockquote>
<p>Hessel et al., EMNLP 2021(意訳)</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="28" data-paginate="true" data-class="takeaway" data-theme="research" lang="en-US" class="takeaway" data-marpit-pagination="28" style="--paginate:true;--class:takeaway;--theme:research;" data-marpit-pagination-total="44" data-size="16:9">
<h1 id="%E5%B1%80%E6%89%80%E7%89%B9%E5%BE%B4%E3%81%AE%E5%B0%8E%E5%85%A5%E3%81%A0%E3%81%91%E3%81%A7%E4%BA%BA%E6%89%8B%E8%A9%95%E4%BE%A1%E3%81%A8%E3%81%AE%E7%9B%B8%E9%96%A2%E3%81%AF-054-%E2%86%92-069-%E3%81%AB%E5%90%91%E4%B8%8A%E3%81%99%E3%82%8B">局所特徴の導入だけで、人手評価との相関は 0.54 → 0.69 に向上する</h1>
<p>追加学習は統合層のみ、推論コストは1.2倍に収まる</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="29" data-paginate="true" data-class="content-lead" data-theme="research" lang="en-US" class="content-lead" data-marpit-pagination="29" style="--paginate:true;--class:content-lead;--theme:research;" data-marpit-pagination-total="44" data-size="16:9">
<h1 id="%E8%80%83%E5%AF%9F">考察</h1>
<p>局所特徴の寄与は劣化タイプに依存し、特に構造破綻で顕著だった。</p>
<ul>
<li>構造破綻(手指・文字)では相関が +0.21 と最も改善</li>
<li>色調・スタイルの劣化では既存手法と同等</li>
<li><strong>限界</strong>: パッチ粒度が固定のため、微細なテクスチャ劣化は捉えきれない</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="30" data-paginate="true" data-class="steps-v" data-theme="research" lang="en-US" class="steps-v" data-marpit-pagination="30" style="--paginate:true;--class:steps-v;--theme:research;" data-marpit-pagination-total="44" data-size="16:9">
<h1 id="%E5%AE%9F%E9%A8%93%E6%89%8B%E9%A0%86">実験手順</h1>
<ol>
<li><strong>データ準備</strong> 3データセットから生成画像と人手評価を収集</li>
<li><strong>スコア計算</strong> 提案手法と既存4手法でスコアを算出</li>
<li><strong>相関評価</strong> Spearman順位相関で人手評価との一致度を測定</li>
<li><strong>アブレーション</strong> 局所・大域の寄与を分解して検証</li>
</ol>
</section>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="34" data-paginate="true" data-class="io" data-theme="research" lang="en-US" class="io" data-marpit-pagination="34" style="--paginate:true;--class:io;--theme:research;" data-marpit-pagination-total="44" data-size="16:9">
<h1 id="%E6%8F%90%E6%A1%88%E6%89%8B%E6%B3%95%E3%81%AE%E5%85%A5%E5%87%BA%E5%8A%9B">提案手法の入出力</h1>
<h2 id="%E5%85%A5%E5%8A%9B">入力</h2>
<ul>
<li><strong>生成画像</strong> 評価対象(任意解像度)</li>
<li><strong>プロンプト</strong> 生成時のテキスト</li>
<li><strong>参照領域</strong> 任意。局所指定マスク</li>
</ul>
<h2 id="%E5%87%A6%E7%90%86">処理</h2>
<ul>
<li><strong>パッチ分割</strong> 32px格子に分割</li>
<li><strong>CLIP特徴抽出</strong> パッチ単位で埋め込み</li>
<li><strong>集約</strong> 下位10%点の平均</li>
</ul>
<h2 id="%E5%87%BA%E5%8A%9B">出力</h2>
<ul>
<li><strong>局所忠実度スコア</strong> 0〜1の実数</li>
<li><strong>破綻ヒートマップ</strong> 可視化用</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="35" data-paginate="true" data-class="confusion-matrix" data-theme="research" lang="en-US" class="confusion-matrix" data-marpit-pagination="35" style="--paginate:true;--class:confusion-matrix;--theme:research;" data-marpit-pagination-total="44" data-size="16:9">

<h1 id="%E3%81%BE%E3%81%A8%E3%82%81">まとめ</h1>
<ul>
<li>局所特徴を考慮した画像生成の自動評価指標を提案した
<ul>
<li>CLIP埋め込みを再利用し追加学習を最小化</li>
</ul>
</li>
<li>3つのデータセットで人手評価との相関が既存手法を上回った</li>
<li>今後の課題: 動画生成への拡張、劣化タイプ別の分析</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="37" data-paginate="true" data-class="references" data-theme="research" lang="en-US" class="references" data-marpit-pagination="37" style="--paginate:true;--class:references;--theme:research;" data-marpit-pagination-total="44" data-size="16:9">
<h1 id="%E5%8F%82%E8%80%83%E6%96%87%E7%8C%AE">参考文献</h1>
<ol>
<li>Radford, A. et al.: Learning Transferable Visual Models From Natural Language Supervision, ICML, 2021.</li>
<li>Hessel, J. et al.: CLIPScore: A Reference-free Evaluation Metric for Image Captioning, EMNLP, 2021.</li>
<li>Heusel, M. et al.: GANs Trained by a Two Time-Scale Update Rule Converge to a Local Nash Equilibrium, NeurIPS, 2017.</li>
<li>Zhang, R. et al.: The Unreasonable Effectiveness of Deep Features as a Perceptual Metric, CVPR, 2018.</li>
<li>Saharia, C. et al.: Photorealistic Text-to-Image Diffusion Models with Deep Language Understanding, NeurIPS, 2022.</li>
</ol>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="38" data-paginate="true" data-class="definition" data-theme="research" lang="en-US" class="definition" data-marpit-pagination="38" style="--paginate:true;--class:definition;--theme:research;" data-marpit-pagination-total="44" data-size="16:9">
<h1 id="%E5%B1%80%E6%89%80%E5%BF%A0%E5%AE%9F%E5%BA%A6%E3%82%B9%E3%82%B3%E3%82%A2local-fidelity-score">局所忠実度スコア(Local Fidelity Score)</h1>
<blockquote>
<p>生成画像とプロンプトが指す局所領域について、パッチ単位のCLIP特徴類似度を<br />
画像全体で集約した評価指標。既存の画像全体スコアでは検出できない局所的な<br />
破綻(手指・文字領域等)を捉えることを目的とする。</p>
</blockquote>
<p>パッチサイズ 32px、集約は下位10%点の平均を用いる</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="39" data-paginate="true" data-class="cards" data-theme="research" lang="en-US" class="cards" data-marpit-pagination="39" style="--paginate:true;--class:cards;--theme:research;" data-marpit-pagination-total="44" data-size="16:9">
<h1 id="%E5%AE%9F%E8%A3%85%E4%B8%8A%E3%81%AE%E5%B7%A5%E5%A4%AB%E7%82%B9">実装上の工夫点</h1>
<ul>
<li><strong>パッチ分割</strong> 重なりありのスライディングウィンドウで局所領域を網羅</li>
<li><strong>特徴の再利用</strong> CLIPエンコーダは追加学習せず埋め込みのみ再利用</li>
<li><strong>閾値較正</strong> 人手評価との相関が最大になる分位点を検証セットで決定</li>
<li><strong>外れ値処理</strong> 極端に低いパッチスコアはクリッピングして安定化</li>
<li><strong>バッチ処理</strong> 1画像あたり平均40msで計算可能</li>
<li><strong>多言語対応</strong> プロンプトの言語非依存(画像側の特徴のみ使用)</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="40" data-paginate="true" data-class="scorecard" data-theme="research" lang="en-US" class="scorecard" data-marpit-pagination="40" style="--paginate:true;--class:scorecard;--theme:research;" data-marpit-pagination-total="44" data-size="16:9">
<h1 id="%E8%A9%95%E4%BE%A1%E6%8C%87%E6%A8%99%E3%81%A8%E3%81%97%E3%81%A6%E3%81%AE%E5%A6%A5%E5%BD%93%E6%80%A7">評価指標としての妥当性</h1>
<ul>
<li><strong>人手評価との相関</strong> 既存手法比で最も高い <em>0.81</em></li>
<li><strong>計算コスト</strong> 追加学習不要で軽量 <em>4.6</em></li>
<li><strong>解釈のしやすさ</strong> パッチ単位で破綻箇所を提示できる <em>4.2</em></li>
<li><strong>頑健性</strong> 画像サイズ・アスペクト比の変化に強い <em>3.9</em></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="41" data-paginate="true" data-class="transition" data-theme="research" lang="en-US" class="transition" data-marpit-pagination="41" style="--paginate:true;--class:transition;--theme:research;" data-marpit-pagination-total="44" data-size="16:9">
<h1 id="%E8%A9%95%E4%BE%A1%E6%96%B9%E6%B3%95%E3%81%AE%E5%A4%89%E5%8C%96">評価方法の変化</h1>
<h2 id="%E5%BE%93%E6%9D%A5%E7%94%BB%E5%83%8F%E5%85%A8%E4%BD%93%E3%82%B9%E3%82%B3%E3%82%A2">従来(画像全体スコア)</h2>
<ul>
<li>画像全体を1つの埋め込みで比較</li>
<li>局所的な破綻を平均化して見逃す</li>
<li>人手評価との相関が頭打ち</li>
</ul>
<h2 id="%E6%8F%90%E6%A1%88%E5%B1%80%E6%89%80%E5%BF%A0%E5%AE%9F%E5%BA%A6%E3%82%B9%E3%82%B3%E3%82%A2">提案(局所忠実度スコア)</h2>
<ul>
<li>パッチ単位で局所的な破綻を検出</li>
<li>下位分位点で集約し破綻箇所を反映</li>
<li>人手評価との相関が既存手法を上回る</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="42" data-paginate="true" data-class="changelog" data-theme="research" lang="en-US" class="changelog" data-marpit-pagination="42" style="--paginate:true;--class:changelog;--theme:research;" data-marpit-pagination-total="44" data-size="16:9">
