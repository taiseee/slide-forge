<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 560" font-family="Hiragino Kaku Gothic ProN, Helvetica Neue, sans-serif">
  <!-- business スキンの作図パレット: 線 #8a7a63 / 枠 #b5a88f / パネル #f1ece2 / 強調 #55483a -->
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8a7a63"/>
    </marker>
    <marker id="ar-m" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b5a88f"/>
    </marker>
  </defs>
  <!-- 起案 -->
  <rect x="30" y="245" width="150" height="70" fill="none" stroke="#b5a88f" stroke-width="1.5"/>
  <text x="105" y="288" fill="#38332c" font-size="24" text-anchor="middle">起案</text>
  <line x1="180" y1="280" x2="232" y2="280" stroke="#8a7a63" stroke-width="2" marker-end="url(#ar)"/>
  <!-- 課長承認 -->
  <rect x="240" y="245" width="160" height="70" fill="none" stroke="#b5a88f" stroke-width="1.5"/>
  <text x="320" y="288" fill="#38332c" font-size="24" text-anchor="middle">課長承認</text>
  <line x1="400" y1="280" x2="424" y2="280" stroke="#8a7a63" stroke-width="2" marker-end="url(#ar)"/>
  <!-- 分岐 -->
  <polygon points="540,190 650,280 540,370 430,280" fill="#f1ece2"/>
  <text x="540" y="272" fill="#38332c" font-size="22" text-anchor="middle">金額が</text>
  <text x="540" y="302" fill="#38332c" font-size="22" text-anchor="middle">100万円以上?</text>
  <!-- YES → 役員決裁 -->
  <polyline points="650,280 700,280 700,185 732,185" fill="none" stroke="#8a7a63" stroke-width="2" marker-end="url(#ar)"/>
  <text x="672" y="258" fill="#55483a" font-size="19" font-weight="600">YES</text>
  <rect x="740" y="150" width="170" height="70" fill="none" stroke="#b5a88f" stroke-width="1.5"/>
  <text x="825" y="193" fill="#38332c" font-size="24" text-anchor="middle">役員決裁</text>
  <!-- NO → 部長承認 -->
  <polyline points="540,370 540,395 732,395" fill="none" stroke="#8a7a63" stroke-width="2" marker-end="url(#ar)"/>
  <text x="562" y="386" fill="#98907f" font-size="19" font-weight="600">NO</text>
  <rect x="740" y="360" width="170" height="70" fill="none" stroke="#b5a88f" stroke-width="1.5"/>
  <text x="825" y="403" fill="#38332c" font-size="24" text-anchor="middle">部長承認</text>
  <!-- 合流 → 発注 -->
  <polyline points="910,185 1025,185 1025,237" fill="none" stroke="#8a7a63" stroke-width="2" marker-end="url(#ar)"/>
  <polyline points="910,395 1025,395 1025,323" fill="none" stroke="#8a7a63" stroke-width="2" marker-end="url(#ar)"/>
  <rect x="965" y="245" width="120" height="70" fill="#55483a"/>
  <text x="1025" y="288" fill="#f7f5f0" font-size="24" text-anchor="middle">発注</text>
  <!-- 差し戻し -->
  <polyline points="320,315 320,480 105,480 105,323" fill="none" stroke="#b5a88f" stroke-width="1.8" stroke-dasharray="7 6" marker-end="url(#ar-m)"/>
  <text x="212" y="470" fill="#98907f" font-size="19" text-anchor="middle">差し戻し</text>
</svg>
